<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unlock Your Brain's Hidden Potential</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0B0B10;font-family:Georgia,serif;color:#EAE6DA;}
  input::placeholder{color:#4a4840;}
  input{caret-color:#D4A843;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const G="#D4A843",GL="#F0C96A",BG="#0B0B10",CARD="#16161F",MUTED="#6B6860",TXT="#EAE6DA",BDR="rgba(212,168,67,0.22)";

const Qs=[
  {q:"When you try to concentrate deeply, what most often interrupts you?",opts:["Racing or scattered thoughts I can't slow down","Outside noise or environmental distractions","I zone out after 10–15 minutes without realising it","Honestly, I concentrate well — focus isn't my issue"]},
  {q:"When you learn something new, how would you describe your experience?",opts:["I absorb it fast but forget it quickly","I need to go over it many times before it sticks","It takes a while to learn but I retain it well","I pick up and retain new things easily"]},
  {q:"How often do you experience 'mental fog' — that fuzzy, can't-think-straight feeling?",opts:["Almost daily, especially in the afternoon","Several times a week after demanding tasks","Occasionally, mostly when stressed","Rarely — my thinking feels clear most of the time"]},
  {q:"How do you feel at your mental best?",opts:["I get brief windows of sharpness but they're unpredictable","I'm sharpest in the morning and fade fast","Fairly consistent, but never truly 'on fire'","I rarely feel like I'm operating at full capacity"]},
  {q:"What's your relationship with sound while working or thinking?",opts:["Complete silence — any noise throws me off","Background music actually helps me focus","Never really thought about it","Some sounds calm me, others agitate me instantly"]},
  {q:"If you could unlock ONE cognitive upgrade overnight, what would it be?",opts:["Laser-sharp focus, on demand","A memory that retains everything effortlessly","Faster, clearer problem-solving","Consistent creative flow and mental energy"]},
];

const PROFILES=[
  {label:"The Dormant Genius",icon:"🧠",score:84,
   body:"Your results reveal something remarkable: your brain is carrying significant untapped capacity being held back by a specific pattern of neural interference. This is not a flaw — it is actually one of the clearest signs that your ceiling for cognitive performance is far higher than your daily experience suggests.",
   traits:[{name:"Focus Potential",val:"Exceptionally High",pct:92},{name:"Memory Capacity",val:"Above Average",pct:78},{name:"Current Utilisation",val:"~38%",pct:38},{name:"Breakthrough Speed",val:"Very Fast",pct:88}],
   cta:"Your profile places you among the top 12% of quiz-takers with the highest potential for rapid cognitive improvement. There is one specific method built for this exact brain type — and it is currently free to view."},
  {label:"The Awakening Mind",icon:"⚡",score:77,
   body:"Your answers paint a clear picture: you have natural cognitive strengths that are not being fully expressed. Something is creating friction between what your brain is capable of and what it actually delivers day to day. The fascinating thing is — this is remarkably common, and remarkably solvable.",
   traits:[{name:"Focus Potential",val:"High",pct:82},{name:"Learning Speed",val:"Strong",pct:74},{name:"Current Utilisation",val:"~47%",pct:47},{name:"Improvement Speed",val:"Rapid",pct:85}],
   cta:"Your brain type responds especially well to a specific audio-based stimulus that researchers have linked to unlocking suppressed cognitive function. Thousands have already used this — and your profile suggests you are an ideal candidate."},
];

// ── REPLACE THIS WITH YOUR CLICKBANK LINK ──
const CB_LINK = "https://hop.clickbank.net/?affiliate=YOURID&vendor=geniussng";

function Btn({children,onClick,style={}}){
  const [hov,setHov]=useState(false);
  return(
    <button onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{width:"100%",padding:"16px 20px",background:`linear-gradient(135deg,${G},${GL})`,color:"#0B0B10",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer",transform:hov?"translateY(-2px)":"none",boxShadow:hov?`0 8px 28px rgba(212,168,67,0.38)`:"none",transition:"all 0.2s",fontFamily:"Georgia,serif",...style}}>
      {children}
    </button>
  );
}

function Card({children,style={}}){
  return <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,padding:"28px 24px",...style}}>{children}</div>;
}

function App(){
  const [phase,setPhase]=useState("intro");
  // ── FUNNEL TRACKER ──
  useEffect(()=>{ console.log("%c🧠 Brain Quiz Funnel Loaded","color:#D4A843;font-size:14px;font-weight:bold;"); },[]);
  const [qi,setQi]=useState(0);
  const [answers,setAnswers]=useState([]);
  const [sel,setSel]=useState(null);
  const [profile,setProfile]=useState(null);
  const [animated,setAnimated]=useState(false);
  const [showPopup,setShowPopup]=useState(false);
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [secs,setSecs]=useState(899);

  useEffect(()=>{
    const labels={"intro":"👋 Intro Page","quiz":"📝 Quiz Started","result":"📊 Result Page","bridge":"🌉 Bridge Page"};
    if(labels[phase]) console.log("%c"+labels[phase],"color:#F0C96A;font-weight:bold;font-size:13px;");
    if(phase!=="bridge")return;
    const t=setInterval(()=>setSecs(s=>s>0?s-1:0),1000);
    return()=>clearInterval(t);
  },[phase]);

  useEffect(()=>{
    if(phase==="result"){const t=setTimeout(()=>setAnimated(true),300);return()=>clearTimeout(t);}
  },[phase]);

  const pct=Math.round((qi/Qs.length)*100);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const circ=2*Math.PI*42;

  function next(){
    if(sel===null)return;
    const upd=[...answers,sel];
    setAnswers(upd);setSel(null);
    if(qi+1<Qs.length){setQi(qi+1);}
    else{setProfile(upd[5]>=2?PROFILES[1]:PROFILES[0]);setPhase("result");}
  }

  function handleSubmit(){
    console.log("%c📧 Lead Captured — Name: "+(name||"(skipped)")+" | Email: "+(email||"(skipped)"),"color:#4FC3F7;font-weight:bold;font-size:13px;");
    console.log("%c🚀 Redirecting to ClickBank: "+CB_LINK,"color:#D4A843;font-size:12px;");
    setShowPopup(false);
    window.location.href=CB_LINK;
  }

  return(
    <div style={{background:BG,minHeight:"100vh",color:TXT,fontFamily:"Georgia,serif"}}>

      {/* POPUP */}
      {showPopup&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",backdropFilter:"blur(6px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:24,padding:"36px 28px",maxWidth:420,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:12}}>🔓</div>
            <h2 style={{fontSize:22,fontWeight:900,marginBottom:10,color:TXT}}>Your <span style={{color:G}}>Secret Report</span> Is Ready</h2>
            <p style={{fontSize:13,color:MUTED,lineHeight:1.65,marginBottom:22}}>Based on your answers, we have built a personalised breakdown of your hidden mental ability. Enter your details to receive it instantly — free.</p>
            <input type="text" placeholder="Enter your name" value={name} onChange={e=>setName(e.target.value)}
              style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"13px 15px",color:TXT,fontSize:14,marginBottom:10,outline:"none",display:"block",fontFamily:"sans-serif"}}/>
            <input type="email" placeholder="Enter your email" value={email} onChange={e=>setEmail(e.target.value)}
              style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"13px 15px",color:TXT,fontSize:14,marginBottom:18,outline:"none",display:"block",fontFamily:"sans-serif"}}/>
            <Btn onClick={handleSubmit}>Send My Free Report →</Btn>
            <p onClick={handleSubmit} style={{marginTop:14,fontSize:12,color:MUTED,cursor:"pointer",textDecoration:"underline"}}>No thanks, skip the report</p>
            <p style={{fontSize:11,color:MUTED,marginTop:12,lineHeight:1.5}}>🔒 100% private. No spam. Unsubscribe anytime.</p>
          </div>
        </div>
      )}

      <div style={{maxWidth:620,margin:"0 auto",padding:"0 16px 60px"}}>

        {/* INTRO */}
        {phase==="intro"&&(
          <div style={{textAlign:"center",paddingTop:44}}>
            <div style={{display:"inline-block",fontSize:10,fontWeight:700,letterSpacing:3,textTransform:"uppercase",color:G,border:`1px solid ${BDR}`,padding:"5px 14px",borderRadius:20,background:"rgba(212,168,67,0.07)",marginBottom:20}}>
              ⚡ Cognitive Discovery Quiz
            </div>
            <h1 style={{fontSize:"clamp(26px,6vw,40px)",fontWeight:900,lineHeight:1.18,marginBottom:14}}>
              Is Your Brain <span style={{color:G}}>Operating at<br/>Its True Capacity?</span>
            </h1>
            <p style={{fontSize:15,color:MUTED,lineHeight:1.65,maxWidth:440,margin:"0 auto 22px"}}>
              Scientists have discovered a rare neurological pattern in some people's brains. This 60-second quiz reveals whether you have it — and what to do about it.
            </p>
            <div style={{background:"rgba(212,168,67,0.08)",border:`1px solid ${BDR}`,borderRadius:10,padding:"10px 18px",fontSize:13,color:GL,display:"inline-flex",alignItems:"center",gap:8,marginBottom:28}}>
              <span style={{width:8,height:8,background:"#FF5252",borderRadius:"50%",display:"inline-block"}}/>
              <span><strong>1,247 people</strong> have taken this quiz today</span>
            </div>
            <Card style={{textAlign:"center"}}>
              <div style={{fontSize:52,marginBottom:16}}>🧠</div>
              <p style={{fontSize:14,color:MUTED,lineHeight:1.7,marginBottom:22}}>
                In just <strong style={{color:TXT}}>6 quick questions</strong>, we will reveal your brain's hidden processing style — and whether you are unknowingly blocking your own potential.
              </p>
              <Btn onClick={()=>{console.log("%c▶️ Quiz Started by user","color:#6FCF97;font-weight:bold;");setPhase("quiz");}}>Begin The Discovery →</Btn>
            </Card>
          </div>
        )}

        {/* QUIZ */}
        {phase==="quiz"&&(
          <div style={{paddingTop:36}}>
            <div style={{marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:MUTED,marginBottom:7}}>
                <span>Question {qi+1} of {Qs.length}</span><span>{pct}%</span>
              </div>
              <div style={{height:4,background:"rgba(255,255,255,0.07)",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:pct+"%",background:`linear-gradient(90deg,${G},${GL})`,borderRadius:4,transition:"width 0.5s"}}/>
              </div>
            </div>
            <Card>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:G,marginBottom:12}}>Question {qi+1} of {Qs.length}</div>
              <div style={{fontSize:"clamp(16px,3.5vw,20px)",fontWeight:700,lineHeight:1.4,marginBottom:22}}>{Qs[qi].q}</div>
              {Qs[qi].opts.map((opt,i)=>(
                <div key={i} onClick={()=>setSel(i)} style={{background:sel===i?"rgba(212,168,67,0.12)":"rgba(255,255,255,0.03)",border:`1px solid ${sel===i?G:"rgba(255,255,255,0.09)"}`,borderRadius:11,padding:"13px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,marginBottom:10,fontSize:14,color:sel===i?GL:TXT,transition:"all 0.18s"}}>
                  <div style={{width:28,height:28,borderRadius:7,flexShrink:0,border:`1px solid ${sel===i?G:"rgba(255,255,255,0.13)"}`,background:sel===i?G:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:sel===i?BG:MUTED}}>
                    {"ABCD"[i]}
                  </div>
                  {opt}
                </div>
              ))}
              {sel!==null&&(
                <Btn onClick={next} style={{marginTop:16}}>
                  {qi+1<Qs.length?"Next Question →":"See My Results →"}
                </Btn>
              )}
            </Card>
          </div>
        )}

        {/* RESULT */}
        {phase==="result"&&profile&&(
          <div style={{paddingTop:28}}>
            <Card>
              <div style={{textAlign:"center",marginBottom:20}}>
                <svg width="110" height="110" viewBox="0 0 100 100" style={{transform:"rotate(-90deg)"}}>
                  <defs>
                    <linearGradient id="grd" x1="0%" y1="0%" x2="100%" y2="0%">
                      <stop offset="0%" stopColor={G}/><stop offset="100%" stopColor={GL}/>
                    </linearGradient>
                  </defs>
                  <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="7"/>
                  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#grd)" strokeWidth="7" strokeLinecap="round"
                    strokeDasharray={circ} strokeDashoffset={animated?circ-(circ*profile.score/100):circ}
                    style={{transition:"stroke-dashoffset 1.4s ease 0.2s"}}/>
                </svg>
                <div style={{marginTop:-80,marginBottom:70,textAlign:"center"}}>
                  <div style={{fontSize:24,fontWeight:900,color:G}}>{profile.score}</div>
                  <div style={{fontSize:10,color:MUTED,letterSpacing:1}}>SCORE</div>
                </div>
              </div>
              <div style={{textAlign:"center",marginBottom:20}}>
                <div style={{fontSize:38,marginBottom:10}}>{profile.icon}</div>
                <h2 style={{fontSize:"clamp(20px,5vw,30px)",fontWeight:900,color:TXT,marginBottom:12}}>{profile.label}</h2>
                <p style={{fontSize:14,color:MUTED,lineHeight:1.7,maxWidth:460,margin:"0 auto"}}>{profile.body}</p>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:22}}>
                {profile.traits.map((t,i)=>(
                  <div key={i} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:11,padding:13}}>
                    <div style={{fontSize:10,color:MUTED,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>{t.name}</div>
                    <div style={{fontSize:13,fontWeight:700,color:TXT}}>{t.val}</div>
                    <div style={{height:3,background:"rgba(255,255,255,0.07)",borderRadius:3,marginTop:8,overflow:"hidden"}}>
                      <div style={{height:"100%",width:animated?t.pct+"%":"0%",background:`linear-gradient(90deg,${G},${GL})`,borderRadius:3,transition:`width 1.1s ease ${0.3+i*0.1}s`}}/>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{background:"rgba(212,168,67,0.07)",border:`1px solid ${BDR}`,borderRadius:14,padding:22,marginBottom:16}}>
                <p style={{fontSize:14,lineHeight:1.7,color:TXT,marginBottom:18}}>{profile.cta}</p>
                <Btn onClick={()=>{console.log("%c👆 CTA Clicked — Moving to Bridge Page","color:#F0C96A;font-size:13px;");setPhase("bridge");}}>Reveal My Full Brain Profile →</Btn>
                <p style={{textAlign:"center",fontSize:11,color:MUTED,marginTop:10}}>🔒 Free · Private · 30 seconds</p>
              </div>
            </Card>
          </div>
        )}

        {/* BRIDGE */}
        {phase==="bridge"&&(
          <div style={{paddingTop:28}}>
            <Card>
              <div style={{display:"inline-block",fontSize:10,fontWeight:700,letterSpacing:3,textTransform:"uppercase",color:G,border:`1px solid ${BDR}`,padding:"5px 14px",borderRadius:20,background:"rgba(212,168,67,0.07)",marginBottom:18}}>
                🧪 Based on your quiz responses
              </div>
              <h2 style={{fontSize:"clamp(20px,5vw,30px)",fontWeight:900,lineHeight:1.2,marginBottom:16,color:TXT}}>
                You Are Closer to a <span style={{color:G}}>Breakthrough</span> Than You Realise
              </h2>
              <p style={{fontSize:14,color:MUTED,lineHeight:1.75,marginBottom:14}}>
                Your answers reveal a fascinating pattern — one researchers have linked to dormant cognitive ability. There is a surprisingly simple method that has helped thousands of people like you unlock clearer thinking, sharper memory, and effortless focus.
              </p>
              <p style={{fontSize:14,color:MUTED,lineHeight:1.75,marginBottom:20}}>
                It does not require pills, apps, or hours of practice. The technique takes less than <strong style={{color:G}}>7 minutes a day</strong> — and results often show up within the first week.
              </p>
              {["Backed by research in auditory neuroscience and brainwave entrainment","Used by students, professionals, and retirees across 40+ countries","No prior experience or special equipment required","Works regardless of age, background, or current cognitive level"].map((item,i)=>(
                <div key={i} style={{display:"flex",gap:10,marginBottom:10,fontSize:14,color:TXT,lineHeight:1.5}}>
                  <span style={{color:G,flexShrink:0}}>✦</span><span>{item}</span>
                </div>
              ))}
              <div style={{background:"rgba(255,82,82,0.07)",border:"1px solid rgba(255,82,82,0.24)",borderRadius:12,padding:"14px 18px",display:"flex",alignItems:"center",gap:12,margin:"22px 0"}}>
                <div style={{flex:1,fontSize:13,color:"#FF7575",lineHeight:1.45}}>⏳ Your personalised access window closes in:</div>
                <div style={{fontSize:22,fontWeight:900,color:"#FF4444",fontFamily:"Georgia,serif",minWidth:70,textAlign:"right"}}>{fmt(secs)}</div>
              </div>
              <Btn onClick={()=>{console.log("%c🔓 Email Popup Opened","color:#F0C96A;font-size:13px;");setShowPopup(true);}}>Show Me This Method →</Btn>
              <p style={{textAlign:"center",fontSize:12,color:MUTED,marginTop:12}}>✔ 100% free to view · No purchase required to start</p>
            </Card>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
